error_log /dev/stderr warn;
access_log /dev/stdout;

events { worker_connections 1024; }

http {
    server {
        listen 443 ssl;

        # Explicit TLS protocol and ciphers — required for compatibility
        # with LibreSSL (macOS curl) and OpenSSL (nginx in container)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Server identity certificates
        ssl_certificate     /etc/nginx/certs/server-cert.pem;
        ssl_certificate_key /etc/nginx/certs/server-key.pem;

        # Mutual TLS: force client certificate checking
        ssl_client_certificate /etc/nginx/certs/ca.pem;
        ssl_verify_client on;

        location / {
            proxy_pass http://127.0.0.1:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep connections open for Jupyter WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
